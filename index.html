<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Երաժշտության քննություն</title>
    <style> 
        body {
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', serif;
            background: url('https://raw.githubusercontent.com/Runny1975/Music-test/main/assets/background.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #quiz {
            width: 92%;
            max-width: 500px;
            padding: 23px;
            background: transparent;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            /* Поднял блок выше на 2 см (примерно 75-80px) */
            margin-top: -40px; 
            box-sizing: border-box;
            text-align: center;
        }

        #timer-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
            border-radius: 3px;
            overflow: hidden;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: #b22222;
            transition: width 1s linear;
        }

        .question {
    font-size: 18px;         /* Чуть-чуть уменьшил с 18, чтобы слова реже переносились */
    font-weight: bold;
    margin-top: 15px;        /* Добавил отступ сверху, чтобы отлепить от счетчика */
    margin-bottom: 15px;     /* Уменьшил нижний отступ, чтобы плеер и кнопки поднялись */
    color: #000;
    width: 100%;
    display: block;
    padding: 0 10px;         /* Чуть больше боковых отступов для баланса */
    line-height: 1.1;        /* Максимально плотный межстрочный интервал */
    text-align: center;
    box-sizing: border-box;
}



        .btn {
            width: 100%;
            /* Уменьшаем высоту: 6px — отступ сверху/снизу, 12px — по бокам */
            padding: 12px 15px; 
            margin:9px 0;
            border-radius: 11px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            /* Шрифт ответов оставил крупным */
            font-size: 18px; 
            font-family: inherit;
            transition: 0.3s;
            line-height: 1.1; /* Плотно прижимаем текст внутри кнопки */
        }

        .btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.5);
        }

        .selected-correct {
            background: rgba(46, 204, 113, 0.6) !important;
            border-color: #2ecc71;
        }

        .selected-wrong {
            background: rgba(231, 76, 60, 0.6) !important;
            border-color: #e74c3c;
        }

        #next {
            margin: 15px auto 0 auto; /* Центрируем кнопку */
            padding: 12px 30px;
            display: none;
            background: rgba(245, 245, 220, 0.4); 
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        #audio {
            width: 100%;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div id="quiz">
    <div id="timer-container">
        <div id="timer-bar"></div>
    </div>
    <div id="question" class="question"></div>
    <audio id="audio" controls style="display:none;"></audio>
    <div id="answers"></div>
    <button id="next">Հաջորդը</button>
</div>

    { q: "Ո՞վ է գրել «Մարդուկ-Ջարդուկը» բալետը:", options: ["Չայկովսկի", "Գլազունով", "Մինկուս", "Շոստակովիչ", "Խաչատրյան"], correct: 0 },

    { q: "Ինչպե՞ս է կոչվում 5 հնչյունից բաղկացած լադը (առանց կիսատոների):", options: ["Պենտատոնիկա", "Դիատոնիկա", "Խրոմատիկա", "Դորիական", "Ամբողջատոնային"], correct: 0 },
    { q: "Ո՞ր տեսակի մինորում են վերընթաց շարժման ժամանակ բարձրանում VI և VII աստիճանները:", options: ["Մելոդիկ", "Հարմոնիկ", "Բնական", "Ֆրիգիական", "Լիդիական"], correct: 0 },
    { q: "Կոմիտասի ո՞ր ստեղծագործությունն է հանդիսանում հայ հոգևոր երաժշտության գագաթնակետը:", options: ["Պատարագ", "Կռունկ", "Անտունի", "Կաքավիկ"], correct: 0 },
    { q: "Ո՞ր լադն է տարբերվում բնական մաժորից բարձրացված IV աստիճանով:", options: ["Լիդիական", "Միքսոլիդիական", "Դորիական", "Ֆրիգիական", "Լոկրիական"], correct: 0 },
    { q: "Ո՞ր լադն է տարբերվում բնական մինորից բարձրացված VI աստիճանով:", options: ["Դորիական", "Ֆրիգիական", "Էոլական", "Լոկրիական", "Միքսոլիդիական"], correct: 0 },
    { q: "Ո՞ր լադն է տարբերվում բնական մինորից իջեցված II աստիճանով:", options: ["Ֆրիգիական", "Դորիական", "Լոկրիական", "Էոլական", "Լիդիական"], correct: 0 },
    { q: "Լադ, որում բոլոր հնչյուններն ընթանում են ամբողջական տոներով:", options: ["Ամբողջատոնային", "Խրոմատիկ", "Պենտատոնիկա", "Փոքրացված", "Մաժորային"], correct: 0 },
    { q: "Ո՞ր հնագույն լադն է համընկնում բնական մինորի հետ:", options: ["Էոլական", "Հոնիական", "Դորիական", "Ֆրիգիական", "Լոկրիական"], correct: 0 },
    { q: "Ո՞վ է Փարաջանովի 'Նռան գույնը' ֆիլմի երաժշտության հեղինակը:", options: ["Տիգրան Մանսուրյան", "Արամ Խաչատրյան", "Արնո Բաբաջանյան", "Ավետ Տերտերյան"], correct: 0 },
    { q: "Ինչպե՞ս է կոչվում հնչյունաշարը, որը բաղկացած է միայն կիսատոներից:", options: ["Խրոմատիկ", "Ամբողջատոնային", "Պենտատոնիկա", "Դիատոնիկ", "Ճավայական"], correct: 0 },
    { q: "Ո՞ր թեքմանն է պատկանում դորիական լադը:", options: ["Մինոր", "Մաժոր", "Խառը", "Ատոնալ", "Փոփոխական"], correct: 0 },
    { q: "Մաժորային լադ՝ վարընթաց շարժման ժամանակ իջեցված VI և VII աստիճաններով:", options: ["Մելոդիկ մաժոր", "Հարմոնիկ մաժոր", "Բնական մաժոր", "Լիդիական մաժոր", "Դորիական մաժոր"], correct: 0 },
    { q: "Ո՞ր լադն է հաճախ օգտագործվում հայկական ժողովրդական երաժշտության մեջ:", options: ["Կրկնակի հարմոնիկ մինոր", "Պենտատոնիկա", "Լոկրիական", "Ամբողջատոնային", "Լիդիական"], correct: 0 },
    { q: "Ի՞նչ են 'զուգահեռ լադերը':", options: ["Միևնույն բանալու նշաններն ունեցող մաժոր և մինոր", "Միևնույն տոնիկան ունեցող լադեր", "Տարբեր տեմպերով լադեր", "Նույն կոմպոզիտորի լադեր", "Տարբեր օկտավաներում հնչյունաշարեր"], correct: 0 }
];

const state = {
    index: 0,
    score: 0,
    locked: false,
    timer: null,
    timeLeft: 30
};

const qText = document.getElementById('question');
const answers = document.getElementById('answers');
const nextBtn = document.getElementById('next');
const audio = document.getElementById('audio');
const timerBar = document.getElementById('timer-bar');

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function startTimer() {
    state.timeLeft = 30;
    updateTimerBar();
    clearInterval(state.timer);
    state.timer = setInterval(() => {
        state.timeLeft--;
        updateTimerBar();
        if (state.timeLeft <= 0) {
            clearInterval(state.timer);
            timeOut();
        }
    }, 1000);
}

function updateTimerBar() {
    const width = (state.timeLeft / 30) * 100;
    timerBar.style.width = width + "%";
}

function timeOut() {
    if (state.locked) return;
    state.locked = true;
    qText.innerHTML = `<span style="color:#b22222;">ВРЕМЯ ВЫШЛО!</span>`;
    showCorrectHint();
    nextBtn.style.display = 'block';
}

function showCorrectHint() {
    document.querySelectorAll('.btn').forEach(b => {
        b.disabled = true;
        if (b.dataset.correct === "true") {
            b.classList.add('selected-correct');
        }
    });
}

function showQuestion() {
    state.locked = false;
    startTimer();

    const q = questions[state.index];
    qText.innerText = `${state.index + 1}/${questions.length} — ${q.q}`;
    answers.innerHTML = '';
    nextBtn.style.display = 'none';

    if (q.audio) {
        audio.src = q.audio;
        audio.style.display = 'block';
        audio.currentTime = 0;
    } else {
        audio.pause();
        audio.style.display = 'none';
    }

    let opts = q.options.map((text, i) => ({
        text,
        correct: i === q.correct
    }));

    shuffle(opts);

    opts.forEach(o => {
        const btn = document.createElement('button');
        btn.className = 'btn';
        btn.innerText = o.text;
        btn.dataset.correct = o.correct;
        btn.onclick = () => selectAnswer(btn);
        answers.appendChild(btn);
    });
}

function selectAnswer(btn) {
    if (state.locked) return;
    state.locked = true;
    clearInterval(state.timer);

    const correct = btn.dataset.correct === "true";

    // Возвращаем подсказку: подсвечиваем правильный всегда
    showCorrectHint();

    if (!correct) {
        btn.classList.add('selected-wrong');
    } else {
        state.score++;
    }

    nextBtn.style.display = 'block';
}

nextBtn.onclick = () => {
    state.index++;
    if (state.index < questions.length) {
        showQuestion();
    } else {
        showResult();
    }
};

function showResult() {
    clearInterval(state.timer);
    document.getElementById('timer-container').style.display = 'none';
    
    const score = state.score;
    let finalBg = "";
    let finalMessage = "";

    // Логика распределения результатов
    if (score >= 0 && score < 70) {
        finalBg = "url('https://raw.githubusercontent.com/Runny1975/Music-test/main/assets/background.png')";
        finalMessage = "Քո գիտելիքները բավարար չեն։ Դու դեռ շատ բան պետք է սովորես։";
    } else if (score >= 70 && score < 85) {
        finalBg = "url('https://raw.githubusercontent.com/Runny1975/Music-test/main/assets/background2.jpg')";
        finalMessage = "Քո գիտելիքները երաժշտական դպրոցի մակարդակի են։ Քոլեջ ընդունվելու համար դրանք բավարար չեն։";
    } else if (score >= 85 && score < 98) {
        finalBg = "url('https://raw.githubusercontent.com/Runny1975/Music-test/main/assets/background3.jpg')";
        finalMessage = "Դուք բավականին լավ գիտեք երաժշտության ընդհանուր տեսությունը և կարող եք ընդունվել երաժշտական քոլեջ՝ վճարովի բաժին։";
    } else if (score >= 98 && score <= 100) {
        finalBg = "url('https://raw.githubusercontent.com/Runny1975/Music-test/main/assets/background4.jpg')";
        finalMessage = "Շնորհավորում եմ։ Դուք անցել եք երաժշտական քոլեջի անվճար բաժնի ընդունելության քննությունը։";
    }

    // Меняем фон всей страницы
    document.body.style.backgroundImage = finalBg;
    document.body.style.backgroundSize = "cover"; // Гарантируем, что картинка растянется

    qText.innerText = "Քննության արդյունք";
    
    // Выводим сообщение и счет
    answers.innerHTML = `
        <div style="font-size:22px; margin-bottom:20px; font-weight:bold; color:#000; line-height:1.4;">
            ${finalMessage}
        </div>
        <div style="font-size:40px; margin-bottom:10px;">${score} / ${questions.length}</div>
        <button onclick="location.reload()" class="btn" style="background:#000; color:#fff;">Начать заново</button>
    `;

    nextBtn.style.display = 'none';
    audio.style.display = 'none';
}

shuffle(questions);
showQuestion();
</script>
